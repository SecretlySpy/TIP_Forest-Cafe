<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forest Cafe</title>

  <!-- Google Font for modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- ======== MAIN APPLICATION CARD ======== -->
  <main class="app-container">
    <!-- ===== HEADER ===== -->
    <header>
      <h1>☕ Forest Cafe</h1>
      <p class="subtitle">Your daily dose of energy, fresh from the forest.</p>
    </header>

    <!-- ===== DECORATIVE DIVIDER ===== -->
    <hr class="divider">

    <!-- ===== DAILY SPECIALS ===== -->
    <section class="specials">
      <h2>🌲 Today's Specials</h2>
      <ul>
        <li>
          <span class="emoji">🍵</span>
          <span class="plan-name">Matcha Latte</span>
          <span class="price-group">
            <span class="sale-price">₱120</span>
            <span class="regular-price">₱160</span>
          </span>
        </li>
        <li>
          <span class="emoji">☕</span>
          <span class="plan-name">Forest Espresso</span>
          <span class="price-group">
            <span class="sale-price">₱100</span>
            <span class="regular-price">₱130</span>
          </span>
        </li>
        <li>
          <span class="emoji">🥐</span>
          <span class="plan-name">Pine Croissant</span>
          <span class="price-group">
            <span class="sale-price">₱85</span>
            <span class="regular-price">₱110</span>
          </span>
        </li>
      </ul>
    </section>

    <!-- ===== CALL TO ACTION BUTTON ===== -->
    <button class="order-button">Order Now</button>

    <!-- ===== FOOTER TAGLINE ===== -->
    <p class="footer-note">Sip, Relax, Repeat.</p>
  </main>
</body>

</html>
